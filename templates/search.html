<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Search — Bellini Classes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; color: #222; }

        /* Nav */
        nav {
            background: #006747;
            color: white;
            padding: 14px 28px;
            display: flex;
            gap: 24px;
            align-items: center;
        }
        nav .brand { font-size: 1.15em; font-weight: bold; margin-right: auto; }
        nav a { color: #b2dfcf; text-decoration: none; font-size: 0.95em; }
        nav a:hover { color: white; text-decoration: underline; }
        nav a.active { color: white; font-weight: bold; }

        main { max-width: 1250px; margin: 32px auto; padding: 0 20px; }
        h1 { color: #006747; font-size: 1.6em; margin-bottom: 6px; }
        .subtitle { color: #555; margin-bottom: 24px; font-size: 0.95em; }

        /* Filter card */
        .filter-card {
            background: white;
            padding: 22px 24px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            margin-bottom: 28px;
        }
        .filter-card h2 { font-size: 1em; color: #006747; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; margin-bottom: 14px; }
        .filter-row:last-child { margin-bottom: 0; }

        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
        .filter-group.narrow { flex: 0 0 120px; min-width: 120px; }
        .filter-group label {
            font-size: 0.78em;
            font-weight: bold;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .filter-group input,
        .filter-group select {
            padding: 8px 11px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.93em;
            width: 100%;
            background: white;
        }
        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #006747;
            box-shadow: 0 0 0 2px rgba(0,103,71,0.18);
        }

        /* Day checkboxes */
        .day-group { display: flex; flex-direction: column; gap: 5px; }
        .day-group label.group-label {
            font-size: 0.78em;
            font-weight: bold;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .day-checks {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 6px 0;
        }
        .day-checks label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.88em;
            font-weight: bold;
            color: #333;
            background: #f4f6f9;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            user-select: none;
            transition: background 0.12s, border-color 0.12s;
        }
        .day-checks input[type="checkbox"] { margin: 0; accent-color: #006747; }
        .day-checks label:has(input:checked) {
            background: #e6f4ef;
            border-color: #006747;
            color: #006747;
        }

        /* Action buttons */
        .filter-actions { display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; padding-bottom: 1px; }
        .btn {
            padding: 9px 22px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.93em;
            font-weight: bold;
            transition: background 0.15s;
        }
        .btn-primary { background: #006747; color: white; }
        .btn-primary:hover { background: #004d35; }
        .btn-secondary { background: #e4e7ec; color: #333; }
        .btn-secondary:hover { background: #cdd2db; }
        .btn-print { background: #006747; color: white; }
        .btn-print:hover { background: #004d35; }

        /* Results bar */
        .results-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            min-height: 36px;
        }
        .result-count { color: #555; font-size: 0.9em; }

        /* Table */
        .table-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            overflow: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: #006747;
            color: white;
            text-align: left;
            padding: 11px 13px;
            font-size: 0.82em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        tbody td { padding: 10px 13px; border-bottom: 1px solid #eef0f3; font-size: 0.91em; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f0f7f4; }

        .badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 12px;
            font-size: 0.78em;
            font-weight: bold;
        }
        .badge-ug { background: #dbeafe; color: #1d4ed8; }
        .badge-gr { background: #fce7f3; color: #be185d; }

        .course-code { font-family: monospace; font-weight: bold; color: #006747; white-space: nowrap; }

        .empty-state { text-align: center; padding: 56px 20px; color: #888; }
        .empty-state p { margin-top: 8px; }

        /* Print */
        @media print {
            nav, .filter-card, .btn-print { display: none !important; }
            body { background: white; }
            main { margin: 0; padding: 0; max-width: 100%; }
            .table-wrapper { box-shadow: none; }
            .results-bar { justify-content: flex-start; }
        }
    </style>
</head>
<body>

<nav>
    <span class="brand">Bellini Classes</span>
    <a href="/search" class="active">Search Courses</a>
    <a href="/instructor">Instructor</a>
    <a href="/edit">Edit</a>
    <a href="/report">Audit Report</a>
    <a href="/login">Login</a>
</nav>

<main>
    <h1>Course Catalog Search</h1>
    <p class="subtitle">Filter by any combination of criteria — leave a field blank to match all.</p>

    <div class="filter-card">
        <h2>Search Filters</h2>

        <!-- Row 1: course identification filters -->
        <div class="filter-row">
            <div class="filter-group">
                <label for="subjectInput">Subject / Course Code</label>
                <input type="text" id="subjectInput" placeholder="e.g. COP  or  COP 3514">
            </div>
            <div class="filter-group">
                <label for="profInput">Instructor</label>
                <input type="text" id="profInput" placeholder="e.g. Fang">
            </div>
            <div class="filter-group narrow">
                <label for="crnInput">CRN</label>
                <input type="number" id="crnInput" placeholder="91940">
            </div>
            <div class="filter-group narrow">
                <label for="levelSelect">Level</label>
                <select id="levelSelect">
                    <option value="">Any</option>
                    <option value="UG">Undergraduate</option>
                    <option value="GR">Graduate</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="semesterSelect">Semester</label>
                <select id="semesterSelect">
                    <option value="">Any Semester</option>
                    <option value="Spring 2025">Spring 2025</option>
                    <option value="Fall 2025">Fall 2025</option>
                    <option value="Spring 2026">Spring 2026</option>
                    <option value="Summer 2026">Summer 2026</option>
                </select>
            </div>
        </div>

        <!-- Row 2: schedule filters -->
        <div class="filter-row">
            <div class="day-group">
                <label class="group-label">Days</label>
                <div class="day-checks">
                    <label><input type="checkbox" class="day-check" value="M"> Mon</label>
                    <label><input type="checkbox" class="day-check" value="T"> Tue</label>
                    <label><input type="checkbox" class="day-check" value="W"> Wed</label>
                    <label><input type="checkbox" class="day-check" value="R"> Thu</label>
                    <label><input type="checkbox" class="day-check" value="F"> Fri</label>
                </div>
            </div>
            <div class="filter-actions">
                <button class="btn btn-primary" onclick="performSearch()">Search</button>
                <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
            </div>
        </div>
    </div>

    <div class="results-bar">
        <span class="result-count" id="resultCount"></span>
        <button class="btn btn-print" id="printBtn" onclick="window.print()" style="display:none;">
            Print / Export PDF
        </button>
    </div>

    <div id="resultsContainer"></div>
</main>

<script>
    function buildTable(courses) {
        if (courses.length === 0) {
            return `<div class="empty-state">
                <strong>No courses found.</strong>
                <p>Try adjusting or clearing your filters.</p>
            </div>`;
        }

        const rows = courses.map(c => {
            const badge = c.level === 'GR'
                ? '<span class="badge badge-gr">GR</span>'
                : '<span class="badge badge-ug">UG</span>';
            return `<tr>
                <td>${c.crn}</td>
                <td class="course-code">${c.subject}</td>
                <td>${c.name}</td>
                <td>${badge}</td>
                <td>${c.instructor}</td>
                <td>${c.time}</td>
                <td>${c.room}</td>
                <td>${c.enrolled}</td>
                <td>${c.semester}</td>
            </tr>`;
        }).join('');

        return `<div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>CRN</th>
                        <th>Subject</th>
                        <th>Course Name</th>
                        <th>Level</th>
                        <th>Instructor</th>
                        <th>Time</th>
                        <th>Room</th>
                        <th>Enrolled</th>
                        <th>Semester</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    }

    function renderResults(data) {
        const count = data.length;
        document.getElementById('resultCount').textContent =
            count === 0 ? 'No results found.' : `Showing ${count} course${count !== 1 ? 's' : ''}`;
        document.getElementById('printBtn').style.display = count > 0 ? 'inline-block' : 'none';
        document.getElementById('resultsContainer').innerHTML = buildTable(data);
    }

    async function performSearch() {
        const professor  = document.getElementById('profInput').value.trim();
        const subject    = document.getElementById('subjectInput').value.trim();
        const level      = document.getElementById('levelSelect').value;
        const semester   = document.getElementById('semesterSelect').value;
        const crn        = document.getElementById('crnInput').value.trim();
        const checkedDays = [...document.querySelectorAll('.day-check:checked')]
            .map(cb => cb.value).join('');

        const params = new URLSearchParams();
        if (professor)   params.set('professor',   professor);
        if (subject)     params.set('subject',     subject);
        if (level)       params.set('level',       level);
        if (semester)    params.set('semester',    semester);
        if (checkedDays) params.set('days',        checkedDays);
        if (crn)         params.set('crn',         crn);

        const response = await fetch('/api/search?' + params.toString());
        renderResults(await response.json());
    }

    function clearFilters() {
        document.getElementById('profInput').value       = '';
        document.getElementById('subjectInput').value    = '';
        document.getElementById('levelSelect').value     = '';
        document.getElementById('semesterSelect').value  = '';
        document.getElementById('crnInput').value        = '';
        document.querySelectorAll('.day-check').forEach(cb => cb.checked = false);
        loadAll();
    }

    async function loadAll() {
        const response = await fetch('/api/search');
        renderResults(await response.json());
    }

    // Enter key triggers search from any text/number input
    document.querySelectorAll('input[type="text"], input[type="number"]').forEach(el => {
        el.addEventListener('keydown', e => { if (e.key === 'Enter') performSearch(); });
    });

    loadAll();
</script>

</body>
</html>
