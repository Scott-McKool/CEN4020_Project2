<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Catalog — Bellini Classes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; color: #222; }

        /* Nav */
        nav {
            background: #006747;
            color: white;
            padding: 14px 28px;
            display: flex;
            gap: 24px;
            align-items: center;
        }
        nav .brand { font-size: 1.15em; font-weight: bold; margin-right: auto; }
        nav a { color: #b2dfcf; text-decoration: none; font-size: 0.95em; }
        nav a:hover { color: white; text-decoration: underline; }
        nav a.active { color: white; font-weight: bold; }

        main { max-width: 1400px; margin: 32px auto; padding: 0 20px; }
        h1 { color: #006747; font-size: 1.6em; margin-bottom: 6px; }
        .subtitle { color: #555; margin-bottom: 24px; font-size: 0.95em; }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.93em;
            font-weight: bold;
            transition: background 0.15s;
        }
        .btn-primary  { background: #006747; color: white; }
        .btn-primary:hover  { background: #004d35; }
        .btn-secondary { background: #e4e7ec; color: #333; }
        .btn-secondary:hover { background: #cdd2db; }
        .btn-save   { background: #006747; color: white; }
        .btn-save:hover   { background: #004d35; }
        .btn-cancel { background: #e4e7ec; color: #333; }
        .btn-cancel:hover { background: #cdd2db; }

        /* Status */
        #status {
            font-size: 0.9em;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 5px;
            display: none;
        }
        #status.success { background: #d1fae5; color: #065f46; display: inline-block; }
        #status.error   { background: #fee2e2; color: #991b1b; display: inline-block; }

        /* Add form */
        .add-form-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            padding: 22px 24px;
            margin-bottom: 24px;
            display: none;
        }
        .add-form-card h2 { color: #006747; font-size: 1em; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label {
            font-size: 0.78em;
            font-weight: bold;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input,
        .form-group select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.93em;
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #006747;
            box-shadow: 0 0 0 2px rgba(0,103,71,0.18);
        }
        .form-actions { display: flex; gap: 10px; }

        /* Table */
        .table-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            overflow: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: #006747;
            color: white;
            text-align: left;
            padding: 11px 10px;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        tbody td {
            padding: 9px 10px;
            border-bottom: 1px solid #eef0f3;
            font-size: 0.9em;
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f0f7f4; }

        /* Inline edit inputs */
        td input, td select {
            width: 100%;
            padding: 5px 7px;
            border: 1px solid #006747;
            border-radius: 4px;
            font-size: 0.9em;
            background: #f0faf6;
        }
        td input:focus, td select:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(0,103,71,0.2);
        }

        .badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 12px;
            font-size: 0.78em;
            font-weight: bold;
        }
        .badge-ug { background: #dbeafe; color: #1d4ed8; }
        .badge-gr { background: #fce7f3; color: #be185d; }

        .course-code { font-family: monospace; font-weight: bold; color: #006747; }

        .action-cell { white-space: nowrap; display: flex; gap: 6px; }

        .empty-state { text-align: center; padding: 56px 20px; color: #888; }
        .empty-state p { margin-top: 8px; }
    </style>
</head>
<body>

<nav>
    <span class="brand">Bellini Classes</span>
    <a href="/search">Search Courses</a>
    <a href="/edit" class="active">Edit</a>
    <a href="/login">Login</a>
</nav>

<main>
    <h1>Edit Course Catalog</h1>
    <p class="subtitle">Add new courses or edit existing ones. Changes are saved immediately.</p>

    <div class="toolbar">
        <button class="btn btn-primary" onclick="toggleAddForm()">+ Add New Course</button>
        <span id="status"></span>
    </div>

    <!-- Add new course form -->
    <div class="add-form-card" id="add-form">
        <h2>New Course</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>CRN *</label>
                <input type="number" id="new-crn" placeholder="e.g. 91940">
            </div>
            <div class="form-group">
                <label>Course Name *</label>
                <input type="text" id="new-name" placeholder="e.g. Data Structures">
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="new-subject" placeholder="e.g. COP">
            </div>
            <div class="form-group">
                <label>Course Number</label>
                <input type="text" id="new-course-num" placeholder="e.g. 3514">
            </div>
            <div class="form-group">
                <label>Level</label>
                <select id="new-level">
                    <option value="UG">Undergraduate</option>
                    <option value="GR">Graduate</option>
                </select>
            </div>
            <div class="form-group">
                <label>Instructor</label>
                <input type="text" id="new-instructor" placeholder="e.g. Smith, John">
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="text" id="new-time" placeholder="e.g. TR 09:30 AM - 10:45 AM">
            </div>
            <div class="form-group">
                <label>Room</label>
                <input type="text" id="new-room" placeholder="e.g. ENB 118">
            </div>
            <div class="form-group">
                <label>Enrolled</label>
                <input type="number" id="new-enrolled" placeholder="0" value="0">
            </div>
            <div class="form-group">
                <label>Semester</label>
                <select id="new-semester">
                    <option value="Spring 2025">Spring 2025</option>
                    <option value="Fall 2025">Fall 2025</option>
                    <option value="Spring 2026" selected>Spring 2026</option>
                    <option value="Summer 2026">Summer 2026</option>
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-save" onclick="submitAdd()">Add Course</button>
            <button class="btn btn-cancel" onclick="toggleAddForm()">Cancel</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>CRN</th>
                    <th>Subject</th>
                    <th>Course Name</th>
                    <th>Level</th>
                    <th>Instructor</th>
                    <th>Time</th>
                    <th>Room</th>
                    <th>Enrolled</th>
                    <th>Semester</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="catalog-body">
                <tr><td colspan="10" class="empty-state">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    let allCourses = [];

    async function loadData() {
        const res = await fetch('/api/search');
        allCourses = await res.json();
        renderTable(allCourses);
    }

    function renderTable(courses) {
        const tbody = document.getElementById('catalog-body');
        if (courses.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><strong>No courses found.</strong></div></td></tr>`;
            return;
        }

        tbody.innerHTML = courses.map(c => {
            const badge = c.level === 'GR'
                ? '<span class="badge badge-gr">GR</span>'
                : '<span class="badge badge-ug">UG</span>';
            return `<tr data-crn="${c.crn}">
                <td>${c.crn}</td>
                <td class="course-code">${c.subject} ${c.course_num}</td>
                <td>${c.name}</td>
                <td>${badge}</td>
                <td>${c.instructor}</td>
                <td>${c.time}</td>
                <td>${c.room}</td>
                <td>${c.enrolled}</td>
                <td>${c.semester}</td>
                <td><div class="action-cell">
                    <button class="btn btn-secondary" style="padding:5px 12px;font-size:0.85em;" onclick="startEdit(this)">Edit</button>
                </div></td>
            </tr>`;
        }).join('');
    }

    function startEdit(btn) {
        const tr = btn.closest('tr');
        const crn = tr.dataset.crn;
        const course = allCourses.find(c => String(c.crn) === crn);
        if (!course) return;

        tr.innerHTML = `
            <td>${course.crn}</td>
            <td><input type="text" class="e-subject" value="${course.subject}">
                <input type="text" class="e-course-num" value="${course.course_num}" style="margin-top:4px;"></td>
            <td><input type="text" class="e-name" value="${course.name}"></td>
            <td><select class="e-level">
                <option value="UG" ${course.level==='UG'?'selected':''}>UG</option>
                <option value="GR" ${course.level==='GR'?'selected':''}>GR</option>
            </select></td>
            <td><input type="text" class="e-instructor" value="${course.instructor}"></td>
            <td><input type="text" class="e-time" value="${course.time}"></td>
            <td><input type="text" class="e-room" value="${course.room}"></td>
            <td><input type="number" class="e-enrolled" value="${course.enrolled}" style="width:70px;"></td>
            <td><select class="e-semester">
                <option value="Spring 2025" ${course.semester==='Spring 2025'?'selected':''}>Spring 2025</option>
                <option value="Fall 2025"   ${course.semester==='Fall 2025'?'selected':''}>Fall 2025</option>
                <option value="Spring 2026" ${course.semester==='Spring 2026'?'selected':''}>Spring 2026</option>
                <option value="Summer 2026" ${course.semester==='Summer 2026'?'selected':''}>Summer 2026</option>
            </select></td>
            <td><div class="action-cell">
                <button class="btn btn-save" style="padding:5px 12px;font-size:0.85em;" onclick="saveEdit(this, ${course.crn})">Save</button>
                <button class="btn btn-cancel" style="padding:5px 12px;font-size:0.85em;" onclick="loadData()">Cancel</button>
            </div></td>
        `;
    }

    async function saveEdit(btn, crn) {
        const tr = btn.closest('tr');
        const payload = {
            name:       tr.querySelector('.e-name').value,
            subject:    tr.querySelector('.e-subject').value,
            course_num: tr.querySelector('.e-course-num').value,
            level:      tr.querySelector('.e-level').value,
            instructor: tr.querySelector('.e-instructor').value,
            time:       tr.querySelector('.e-time').value,
            room:       tr.querySelector('.e-room').value,
            enrolled:   parseInt(tr.querySelector('.e-enrolled').value) || 0,
            semester:   tr.querySelector('.e-semester').value,
        };

        const res = await fetch(`/api/data/row/${crn}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });

        if (res.ok) {
            setStatus('Saved!', 'success');
            loadData();
        } else {
            const text = await res.text();
            setStatus(text.includes('Unauthorized') ? 'Not logged in — please log in first.' : 'Save failed.', 'error');
        }
    }

    function toggleAddForm() {
        const form = document.getElementById('add-form');
        form.style.display = form.style.display === 'none' || form.style.display === '' ? 'block' : 'none';
    }

    async function submitAdd() {
        const crn = parseInt(document.getElementById('new-crn').value);
        if (!crn) { setStatus('CRN is required.', 'error'); return; }

        const payload = {
            crn,
            name:       document.getElementById('new-name').value,
            subject:    document.getElementById('new-subject').value,
            course_num: document.getElementById('new-course-num').value,
            level:      document.getElementById('new-level').value,
            instructor: document.getElementById('new-instructor').value,
            time:       document.getElementById('new-time').value,
            room:       document.getElementById('new-room').value,
            enrolled:   parseInt(document.getElementById('new-enrolled').value) || 0,
            semester:   document.getElementById('new-semester').value,
        };

        const res = await fetch('/api/data/row/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });

        if (res.ok) {
            setStatus('Course added!', 'success');
            toggleAddForm();
            loadData();
        } else {
            const text = await res.text();
            setStatus(text.includes('Unauthorized') ? 'Not logged in — please log in first.' : 'Failed to add course.', 'error');
        }
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = type;
        setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
    }

    loadData();
</script>

</body>
</html>
